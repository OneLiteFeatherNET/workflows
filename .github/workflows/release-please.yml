name: Reusable - release-please

on:
  workflow_call:
    inputs:
      config-file:
        description: "Path to release-please-config.json"
        required: false
        type: string
        default: "release-please-config.json"
      manifest-file:
        description: "Path to .release-please-manifest.json"
        required: false
        type: string
        default: ".release-please-manifest.json"
      target-branch:
        description: "Branch release-please should operate on (defaults to the caller's branch)"
        required: false
        type: string
        default: ""
      runs-on:
        description: "Runner image"
        required: false
        type: string
        default: "ubuntu-latest"

jobs:
  release-please:
    name: release-please
    runs-on: ${{ inputs.runs-on }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Run release-please
        uses: googleapis/release-please-action@v5
        with:
          config-file: ${{ inputs.config-file }}
          manifest-file: ${{ inputs.manifest-file }}
          target-branch: ${{ inputs.target-branch != '' && inputs.target-branch || github.ref_name }}
