name: Reusable - Gradle Publish

on:
  workflow_call:
    inputs:
      java-version:
        description: "JDK version to use"
        required: false
        type: string
        default: "25"
      java-distribution:
        description: "JDK distribution (temurin, zulu, ...)"
        required: false
        type: string
        default: "temurin"
      runs-on:
        description: "Runner image"
        required: false
        type: string
        default: "ubuntu-latest"
      build-task:
        description: "Gradle task(s) used for the build step before publishing"
        required: false
        type: string
        default: "build"
      publish-task:
        description: "Gradle task(s) used for publishing"
        required: false
        type: string
        default: "publish"
      validate-wrapper:
        description: "Run gradle wrapper validation before building"
        required: false
        type: boolean
        default: true
    secrets:
      ONELITEFEATHER_MAVEN_USERNAME:
        required: true
      ONELITEFEATHER_MAVEN_PASSWORD:
        required: true

concurrency:
  group: gradle-publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build & publish
    runs-on: ${{ inputs.runs-on }}
    env:
      ONELITEFEATHER_MAVEN_USERNAME: ${{ secrets.ONELITEFEATHER_MAVEN_USERNAME }}
      ONELITEFEATHER_MAVEN_PASSWORD: ${{ secrets.ONELITEFEATHER_MAVEN_PASSWORD }}
      GRADLE_OPTS: "-Dorg.gradle.parallel=true -Dorg.gradle.caching=true -Dorg.gradle.welcome=never"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Toolchain info
        shell: bash
        run: |
          echo "Runner       : ${{ runner.os }} ${{ runner.arch }}"
          echo "JDK target   : ${{ inputs.java-version }} (${{ inputs.java-distribution }})"
          echo "Build task   : ${{ inputs.build-task }}"
          echo "Publish task : ${{ inputs.publish-task }}"
          echo "Debug logging: ${{ runner.debug }}"

      - name: Validate Gradle wrapper
        if: ${{ inputs.validate-wrapper }}
        uses: gradle/actions/wrapper-validation@v6

      - name: Set up JDK ${{ inputs.java-version }}
        uses: actions/setup-java@v5
        with:
          distribution: ${{ inputs.java-distribution }}
          java-version: ${{ inputs.java-version }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          add-job-summary: 'always'

      - name: Build
        shell: bash
        run: |
          if [ "${RUNNER_DEBUG:-0}" = "1" ]; then
            ./gradlew ${{ inputs.build-task }} --info --stacktrace
          else
            ./gradlew ${{ inputs.build-task }}
          fi

      - name: Publish
        shell: bash
        run: |
          if [ "${RUNNER_DEBUG:-0}" = "1" ]; then
            ./gradlew ${{ inputs.publish-task }} --info --stacktrace
          else
            ./gradlew ${{ inputs.publish-task }}
          fi

      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publish-reports-jdk${{ inputs.java-version }}
          path: |
            **/build/reports/**
            **/build/test-results/**
          if-no-files-found: ignore
          retention-days: 14
